services:
  - type: web
    name: jbdentalclinic
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_API_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@jbdentalclinic.com
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      # You MUST set these in the Render dashboard after running the Turso CLI setup:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
    healthCheckPath: /
    autoDeploy: true
